apiVersion: apps/v1
kind: Deployment
metadata:
  name: wildlife-detector
  namespace: default
  labels:
    app: wildlife-detector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wildlife-detector
  template:
    metadata:
      labels:
        app: wildlife-detector
    spec:
      containers:
        - name: wildlife-detector
          image: bgan0012/wildlife-yolo-detector:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          # ----------------------------------------------------------------
          # Resource limits — 1 vCPU per pod (assignment requirement).
          # Memory set at 1:2 CPU:RAM ratio per FAQ A4 → 2Gi limit.
          # ONNX runtime uses ~400-600MB; 2Gi provides headroom under load.
          # ----------------------------------------------------------------
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

          env:
            - name: MODEL_PATH
              value: "yolov8l.onnx"
            - name: CONF_THRESHOLD
              value: "0.5"
            - name: INFER_SIZE
              value: "480"

          # ----------------------------------------------------------------
          # Liveness probe — restarts the container if the process hangs.
          # /healthz responds immediately, before model is loaded.
          # ----------------------------------------------------------------
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          # ----------------------------------------------------------------
          # Readiness probe — blocks traffic until YOLO ONNX model is loaded.
          # ONNX loads faster than PyTorch (~15-25s); initialDelaySeconds
          # covers this so the pod is not marked unhealthy during startup.
          # ----------------------------------------------------------------
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
